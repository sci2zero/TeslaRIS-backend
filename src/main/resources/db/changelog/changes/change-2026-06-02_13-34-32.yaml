- changeSet:
    id: 1780407328171-33
    author: milospopovic (generated)
    changes:
    - addColumn:
        columns:
        - column:
            name: institution_name_sortable
            type: VARCHAR(255)
        tableName: registry_book_entries
    - update:
        tableName: registry_book_entries
        columns:
          - column:
              name: institution_name_sortable
              valueComputed: |
                (SELECT mlc."content"
                 FROM theses t
                   LEFT JOIN organisation_units_name oun ON oun.organisation_unit_id = t.organisation_unit_id
                   LEFT JOIN multi_lingual_content mlc ON oun.name_id = mlc.id
                 WHERE t.id = registry_book_entries.thesis_id AND mlc.language_tag_id = 2
                 LIMIT 1
                )

