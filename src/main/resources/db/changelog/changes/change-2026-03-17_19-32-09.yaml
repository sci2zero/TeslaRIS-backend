        - sql:
            sql: |
              UPDATE persons
              SET
                professional_mobile_phone_number = CASE
                  WHEN phone_number ~ '^(\+381\s?6|06)' AND professional_mobile_phone_number IS NULL
                    THEN phone_number
                  ELSE professional_mobile_phone_number
                END,
                professional_phone_number = CASE
                  WHEN phone_number !~ '^(\+381\s?6|06)' AND professional_phone_number IS NULL
                    THEN phone_number
                  ELSE professional_phone_number
                END
              WHERE phone_number IS NOT NULL;
        - dropColumn:
            columnName: phone_number
            tableName: persons
