      id: 1773776003216-181
      author: milospopovic (generated)
      changes:
        - addColumn:
            columns:
              - column:
                  name: public_review_end_dates
                  type: JSONB
            tableName: theses
        - sql:
            sql: |
              UPDATE theses t
              SET public_review_end_dates = data.dates
              FROM (
                  SELECT 
                      tsd.thesis_id,
                      jsonb_agg(
                          jsonb_build_array(
                              EXTRACT(YEAR FROM tsd.public_review_start_dates + INTERVAL '1 month')::int,
                              EXTRACT(MONTH FROM tsd.public_review_start_dates + INTERVAL '1 month')::int,
                              EXTRACT(DAY FROM tsd.public_review_start_dates + INTERVAL '1 month')::int
                          )
                      ) AS dates
                  FROM thesis_public_review_start_dates tsd
                  GROUP BY tsd.thesis_id
              ) data
              WHERE t.id = data.thesis_id and is_on_public_review is FALSE;
