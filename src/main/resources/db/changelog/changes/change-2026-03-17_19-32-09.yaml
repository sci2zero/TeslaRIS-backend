      author: milospopovic (generated)
      changes:
        - sql:
            sql: |
              WITH inserted_ml AS (
              INSERT INTO multi_lingual_content (
                  id,
                  deleted,
                  language_tag_id,
                  priority,
                  private_city_id,
                  private_state_id,
                  private_street_id,
                  professional_city_id,
                  professional_state_id,
                  professional_street_id,
                  created_at,
                  last_modification,
                  admin_note,
                  content,
                  created_by,
                  import_source,
                  updated_by
              )
              SELECT
                  nextval('multi_lingual_content_seq'),
                  false,
                  2,
                  1,
                  NULL,
                  NULL,
                  NULL,
                  NULL,
                  NULL,
                  NULL,
                  NOW(),
                  NOW(),
                  NULL,
                  ou.name_abbreviation,
                  'SCRIPT_CREATED',
                  NULL,
                  'SCRIPT_CREATED'
              FROM organisation_units ou
              WHERE ou.name_abbreviation IS NOT NULL AND ou.name_abbreviation <> ''
              RETURNING id, content
              )
              INSERT INTO organisation_units_name_abbreviation (
                  name_abbreviation_id,
                  organisation_unit_id
              )
              SELECT
                  ml.id,
                  ou.id
              FROM organisation_units ou
              JOIN inserted_ml ml
              ON ml.content = ou.name_abbreviation;
        - dropColumn:
            columnName: name_abbreviation
            tableName: organisation_units
  - changeSet:
