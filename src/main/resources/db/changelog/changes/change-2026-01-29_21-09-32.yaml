  - changeSet:
      id: set-document-type-entity-assessment-classifications
      author: milospopovic
      changes:
        - sql:
            sql: |
              UPDATE entity_assessment_classifications eac
              SET document_type = d.document_type
              FROM (                                          
                  SELECT id, 0 AS document_type FROM journal_publications
                  UNION ALL
                  SELECT id, 1 FROM proceedings
                  UNION ALL
                  SELECT id, 2 FROM proceedings_publications
                  UNION ALL
                  SELECT id, 3 FROM monographs
                  UNION ALL
                  SELECT id, 4 FROM patents
                  UNION ALL
                  SELECT id, 5 FROM intangible_products
                  UNION ALL
                  SELECT id, 6 FROM datasets
                  UNION ALL
                  SELECT id, 7 FROM monograph_publications
                  UNION ALL
                  SELECT id, 8 FROM theses
                  UNION ALL
                  SELECT id, 9 FROM material_products
                  UNION ALL
                  SELECT id, 10 FROM genetic_materials
              ) d
              WHERE d.id = eac.document_id