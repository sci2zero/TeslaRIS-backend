name: TeslaRIS Deploy TEST

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip running tests'
        default: false
        required: false
  push:
    branches:
      - feature/deploy 

jobs:
  build-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13.3
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: TeslaRISDB
        ports:
          - 5432:5432
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.4.3
        options: >-
          --name "elasticsearch"
        env:
          discovery.type: single-node
          ES_JAVA_OPTS: -Xms1g -Xmx1g
          xpack.security.enabled: false
        ports:
          - 9200:9200
      minio:
        image: minio/minio
        env:
          MINIO_ACCESS_KEY: minio-access-key
          MINIO_SECRET_KEY: minio-secret-key
        ports:
          - 9000:9000
      mongo:
        image: mongo:7.0.2
        ports:
          - 27017:27017
    steps:
    
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install Elasticsearch plugin
        run: |
          #!/bin/bash
          docker ps
          docker exec elasticsearch bash -c "bin/elasticsearch-plugin install analysis-icu"
          docker restart elasticsearch

      - name: Build and package with Maven
        run: mvn clean package -DskipTests
        env:
          DB_PASSWORD: postgres

      - name: Echo test
        run: |
          pwd
          ls -la
          ls -la target


      - uses: actions/upload-artifact@v4
        with:
          name: teslaris
          path: target/teslaris-*.jar



  deploy-backend:
    runs-on: ubuntu-latest

    needs: build-backend
    if: needs.build-backend.result == 'success'
    environment:
      name: test

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: teslaris
          path: teslaris

      - name: Echo test
        run: |
          cp teslaris/teslaris-*.jar teslaris.jar 
          pwd
          ls -la

      - name: Copy files to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          source: "teslaris.jar"
          target: "tmp/github-backend"


      - name: Deploy application to blue node
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            chmod +x /opt/teslaris/deploy-script.sh
            /opt/teslaris/deploy-script.sh deploy-blue

      - name: Apply blue node
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            chmod +x /opt/teslaris/deploy-script.sh
            /opt/teslaris/deploy-script.sh apply-blue
